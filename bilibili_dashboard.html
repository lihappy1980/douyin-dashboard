<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站账号数据看板</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bili-blue: #00A1D6;
    --bili-pink: #FF9C33;
    --bili-dark: #18191C;
    --bili-gray: #F4F5F7;
  }
  body { background: #F4F5F7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .bili-blue { color: #00A1D6; }
  .bili-pink { color: #FF9C33; }
  .bg-bili { background: linear-gradient(135deg, #00A1D6, #23B9F0); }
  .lv-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px; font-size: 12px;
    font-weight: 700; color: white;
  }
  .lv-s { background: linear-gradient(135deg,#FF6EB4,#FF9C33); }
  .lv-a { background: linear-gradient(135deg,#FF9C33,#FFA500); }
  .lv-b { background: linear-gradient(135deg,#00A1D6,#23B9F0); }
  .lv-c { background: #9499C0; }
  .card { background: white; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
  .chart-card { background: white; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 20px; }
  .account-card { transition: transform .2s, box-shadow .2s; cursor: default; }
  .account-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,161,214,.15); }
  .metric-num { font-size: 22px; font-weight: 800; font-family: 'SF Pro Display', -apple-system, sans-serif; }
  .metric-label { font-size: 12px; color: #9499A0; font-weight: 500; letter-spacing: .5px; }
  .grade-S { background: linear-gradient(135deg,#FF6EB4,#FF9C33); color: white; }
  .grade-B { background: linear-gradient(135deg,#00A1D6,#23B9F0); color: white; }
  .grade-C { background: #9499C0; color: white; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .tag-own { background: #E3F2FD; color: #00A1D6; }
  .tag-comp { background: #FFF3E0; color: #FF9C33; }
</style>
</head>
<body>

<!-- 顶部导航 -->
<header class="bg-bili text-white sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="18" fill="white"/>
        <path d="M18 6C11.4 6 6 11.4 6 18s5.4 12 12 12 12-5.4 12-12S24.6 6 18 6zm-2 21c0 1.1-.9 2-2 2s-2-.9-2-2V15c0-1.1.9-2 2-2s2 .9 2 2v12zm4-2c0 1.1-.9 2-2 2s-2-.9-2-2V15c0-1.1.9-2 2-2s2 .9 2 2v10z" fill="#00A1D6"/>
      </svg>
      <div>
        <h1 class="text-xl font-bold tracking-wide">B站账号数据看板</h1>
        <p class="text-xs text-blue-100 opacity-80">人形机器人账号矩阵</p>
      </div>
    </div>
    <div class="text-right">
      <div class="text-xs text-blue-100 opacity-80">最后更新</div>
      <div class="text-sm font-semibold" id="update-time">--</div>
    </div>
  </div>
</header>

<!-- 主内容 -->
<main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

  <!-- 汇总指标 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="card p-5 text-center">
      <div class="text-xs text-gray-400 mb-1">总粉丝</div>
      <div class="metric-num bili-blue" id="sum-fans">--</div>
    </div>
    <div class="card p-5 text-center">
      <div class="text-xs text-gray-400 mb-1">总获赞</div>
      <div class="metric-num bili-pink" id="sum-likes">--</div>
    </div>
    <div class="card p-5 text-center">
      <div class="text-xs text-gray-400 mb-1">总视频</div>
      <div class="metric-num" style="color:#23B9F0" id="sum-videos">--</div>
    </div>
    <div class="card p-5 text-center">
      <div class="text-xs text-gray-400 mb-1">监控账号</div>
      <div class="metric-num" style="color:#FF6EB4" id="sum-accounts">--</div>
    </div>
  </div>

  <!-- 账号卡片网格 -->
  <div>
    <h2 class="text-sm font-semibold text-gray-500 mb-3 uppercase tracking-wider">账号详情</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="account-cards">
      <!-- 由JS动态渲染 -->
    </div>
  </div>

  <!-- 图表区 -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="chart-card">
      <h3 class="text-sm font-semibold text-gray-500 mb-4">粉丝数对比</h3>
      <canvas id="fansChart" height="220"></canvas>
    </div>
    <div class="chart-card">
      <h3 class="text-sm font-semibold text-gray-500 mb-4">获赞数对比</h3>
      <canvas id="likesChart" height="220"></canvas>
    </div>
    <div class="chart-card md:col-span-2">
      <h3 class="text-sm font-semibold text-gray-500 mb-4">视频数与均点赞</h3>
      <canvas id="videosChart" height="160"></canvas>
    </div>
  </div>

  <!-- 数据洞察 -->
  <div class="card p-5">
    <h3 class="text-sm font-semibold text-gray-500 mb-3">📊 数据洞察</h3>
    <div id="insights" class="text-sm text-gray-600 space-y-1"></div>
  </div>

</main>

<footer class="text-center text-xs text-gray-400 py-6">
  B站账号数据看板 · 数据来源：Bilibili 公开API · 仅供内部参考
</footer>

<!-- 动态数据区（由 update_bilibili_dashboard.js 注入） -->
<script>

const ACCOUNT_DATA = [{"name":"人形抖机灵","uid":"3546787761621616","fans":1,"likes":75,"videos":6,"plays":0,"level":2,"sign":"人形机器人爱好者，对比区资深up主。关注我，带你玩转机圈","avgLikes":13,"grade":"C"},{"name":"机圈BB机","uid":"1090361131","fans":14,"likes":479,"videos":5,"plays":0,"level":4,"sign":"关注人形机器人行业资讯\nBB机一响，人形来登场","avgLikes":96,"grade":"B"},{"name":"机你钛美","uid":"356891789","fans":2,"likes":0,"videos":0,"plays":0,"level":4,"sign":"","avgLikes":0,"grade":"C"},{"name":"机圈哈机咪","uid":"389127741","fans":11,"likes":335,"videos":27,"plays":0,"level":5,"sign":"机圈AI吃瓜代表，带你围观人形机器人","avgLikes":12,"grade":"B"}];
const HISTORY_DATA = [{"date":"2026-04-28T05:31:48.342Z","accounts":[{"name":"人形抖机灵","uid":"3546787761621616","fans":0,"likes":75,"videos":6,"plays":0,"level":0,"sign":""},{"name":"机圈BB机","uid":"1090361131","fans":0,"likes":479,"videos":5,"plays":0,"level":0,"sign":""},{"name":"机你钛美","uid":"356891789","fans":0,"likes":0,"videos":0,"plays":0,"level":0,"sign":""},{"name":"机圈哈机咪","uid":"389127741","fans":0,"likes":335,"videos":27,"plays":0,"level":0,"sign":""}]},{"date":"2026-04-28T05:33:01.171Z","accounts":[{"name":"人形抖机灵","uid":"3546787761621616","fans":1,"likes":75,"videos":6,"plays":0,"level":0,"sign":""},{"name":"机圈BB机","uid":"1090361131","fans":14,"likes":479,"videos":5,"plays":0,"level":0,"sign":""},{"name":"机你钛美","uid":"356891789","fans":2,"likes":0,"videos":0,"plays":0,"level":0,"sign":""},{"name":"机圈哈机咪","uid":"389127741","fans":11,"likes":335,"videos":27,"plays":0,"level":0,"sign":""}]},{"date":"2026-04-28T05:33:49.691Z","accounts":[{"name":"人形抖机灵","uid":"3546787761621616","fans":1,"likes":75,"videos":6,"plays":0,"level":2,"sign":"人形机器人爱好者，对比区资深up主。关注我，带你玩转机圈"},{"name":"机圈BB机","uid":"1090361131","fans":14,"likes":479,"videos":5,"plays":0,"level":4,"sign":"关注人形机器人行业资讯\nBB机一响，人形来登场"},{"name":"机你钛美","uid":"356891789","fans":2,"likes":0,"videos":0,"plays":0,"level":4,"sign":""},{"name":"机圈哈机咪","uid":"389127741","fans":11,"likes":335,"videos":27,"plays":0,"level":5,"sign":"机圈AI吃瓜代表，带你围观人形机器人"}]}];
const META = {
  totalFans: 28,
  totalLikes: 889,
  totalVideos: 38,
  accountCount: 4,
  updatedStr: "2026/4/28 13:33:45"
};
</script>

<script>
// 格式化数字
function fmt(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '亿';
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  return n.toLocaleString();
}

// 等级颜色
function lvStyle(lv) {
  if (lv >= 5) return 'background: linear-gradient(135deg,#FF6EB4,#FF9C33)';
  if (lv >= 4) return 'background: linear-gradient(135deg,#FF9C33,#FFA500)';
  if (lv >= 3) return 'background: linear-gradient(135deg,#00A1D6,#23B9F0)';
  return 'background: #9499C0';
}

// 渲染汇总
document.getElementById('sum-fans').textContent = fmt(META.totalFans);
document.getElementById('sum-likes').textContent = fmt(META.totalLikes);
document.getElementById('sum-videos').textContent = fmt(META.totalVideos);
document.getElementById('sum-accounts').textContent = META.accountCount;
document.getElementById('update-time').textContent = META.updatedStr;

// 渲染账号卡片
const grid = document.getElementById('account-cards');
const gradeMap = { S:'grade-S', B:'grade-B', C:'grade-C' };
const levelIcons = ['⚪','⚪','🟢','🔵','🟠','🌸','🌟'];
ACCOUNT_DATA.forEach((acc, i) => {
  const lv = acc.level || 0;
  const lvColor = lv >= 5 ? '#FF6EB4' : lv >= 4 ? '#FF9C33' : lv >= 3 ? '#00A1D6' : '#9499C0';
  const row = document.createElement('div');
  row.className = 'account-card card p-5';
  row.innerHTML = `
    <div class="flex items-start justify-between mb-3">
      <div class="flex items-center gap-3">
        <div class="lv-badge" style="${lvStyle(lv)}">${lv === 0 ? '?' : 'Lv.' + lv}</div>
        <div>
          <div class="font-bold text-gray-800">${acc.name}</div>
          <div class="text-xs text-gray-400 mt-0.5 max-w-xs truncate">${acc.sign || '暂无简介'}</div>
        </div>
      </div>
      <div class="flex gap-2">
        <span class="tag ${gradeMap[acc.grade] || 'grade-C'}">${acc.grade || 'C'}</span>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-3">
      <div class="text-center p-3 rounded-xl" style="background:#E3F2FD">
        <div class="text-lg font-bold" style="color:#00A1D6">${fmt(acc.fans)}</div>
        <div class="text-xs text-gray-400 mt-0.5">粉丝</div>
      </div>
      <div class="text-center p-3 rounded-xl" style="background:#FFF3E0">
        <div class="text-lg font-bold" style="color:#FF9C33">${fmt(acc.likes)}</div>
        <div class="text-xs text-gray-400 mt-0.5">获赞</div>
      </div>
      <div class="text-center p-3 rounded-xl" style="background:#F3E5F5">
        <div class="text-lg font-bold" style="color:#9C27B0">${fmt(acc.videos)}</div>
        <div class="text-xs text-gray-400 mt-0.5">视频</div>
      </div>
    </div>
    ${acc.avgLikes > 0 ? `<div class="mt-2 text-xs text-gray-400 text-center">均获赞 ${acc.avgLikes}</div>` : ''}
  `;
  grid.appendChild(row);
});

// 渲染洞察
const insights = document.getElementById('insights');
const sorted = [...ACCOUNT_DATA].sort((a,b) => b.fans - a.fans);
const topFans = sorted[0];
const topLikes = [...ACCOUNT_DATA].sort((a,b) => b.likes - a.likes)[0];
const topVideos = [...ACCOUNT_DATA].sort((a,b) => b.videos - a.videos)[0];
const bestRatio = [...ACCOUNT_DATA].filter(a => a.videos > 0).sort((a,b) => (b.likes/b.videos) - (a.likes/a.videos))[0];

const lines = [
  `🏆 粉丝最多：<strong>${topFans.name}</strong>（${fmt(topFans.fans)}粉丝）`,
  `❤️ 获赞最高：<strong>${topLikes.name}</strong>（${fmt(topLikes.likes)}获赞）`,
  `📹 作品最多：<strong>${topVideos.name}</strong>（${topVideos.videos}个视频）`,
];
if (bestRatio) {
  lines.push(`⚡ 互动效率：<strong>${bestRatio.name}</strong>（均点赞${bestRatio.avgLikes}）`);
}
lines.push(`📌 数据总览：4个账号合计 ${fmt(META.totalFans)} 粉丝、${fmt(META.totalLikes)} 获赞、${fmt(META.totalVideos)} 视频`);
insights.innerHTML = lines.map(l => `<div>${l}</div>`).join('');

// ====== 图表 ======
const labels = ACCOUNT_DATA.map(a => a.name);
const biliColors = ['#00A1D6','#FF9C33','#23B9F0','#FF6EB4','#9C27B0','#4CAF50','#607D8B'];

// 粉丝图
new Chart(document.getElementById('fansChart'), {
  type: 'bar',
  data: {
    labels,
    datasets: [{
      label: '粉丝数',
      data: ACCOUNT_DATA.map(a => a.fans),
      backgroundColor: biliColors.map(c => c + 'CC'),
      borderColor: biliColors,
      borderWidth: 2,
      borderRadius: 8,
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `粉丝: ${ctx.raw}` } } },
    scales: {
      y: { beginAtZero: true, ticks: { font: { size: 11 } } },
      x: { ticks: { font: { size: 11 } } }
    }
  }
});

// 获赞图
new Chart(document.getElementById('likesChart'), {
  type: 'bar',
  data: {
    labels,
    datasets: [{
      label: '获赞数',
      data: ACCOUNT_DATA.map(a => a.likes),
      backgroundColor: '#FF9C33CC',
      borderColor: '#FF9C33',
      borderWidth: 2,
      borderRadius: 8,
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `获赞: ${ctx.raw}` } } },
    scales: {
      y: { beginAtZero: true, ticks: { font: { size: 11 } } },
      x: { ticks: { font: { size: 11 } } }
    }
  }
});

// 视频+均点赞双轴图
new Chart(document.getElementById('videosChart'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      {
        label: '视频数',
        data: ACCOUNT_DATA.map(a => a.videos),
        backgroundColor: '#9C27B0CC',
        borderColor: '#9C27B0',
        borderWidth: 2,
        borderRadius: 8,
      },
      {
        label: '均点赞',
        data: ACCOUNT_DATA.map(a => a.avgLikes),
        type: 'line',
        borderColor: '#FF6EB4',
        backgroundColor: '#FF6EB422',
        borderWidth: 2,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#FF6EB4',
      }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { position: 'top', font: { size: 12 } }
    },
    scales: {
      y: { beginAtZero: true, ticks: { font: { size: 11 } } },
      x: { ticks: { font: { size: 11 } } }
    }
  }
});
</script>

</body>
</html>
